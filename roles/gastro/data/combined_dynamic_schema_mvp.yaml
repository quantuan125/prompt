# Combined Tracking Entry Schema — MVP (draft)
# Purpose: Single LLM-facing SCHEMA block for required tracking entry types.
# Note: Per-entry SCHEMAs in other YAML files remain the design sources;
# this file provides a consolidated view for T810A1-S05 Execution Protocol.

dynamic_schemas:
  meal:
    entry_type: "meal"
    timestamp: "2025-01-01T12:30:00Z"
    items:
      - "rice and grilled chicken"
    ingredients:
      - "chili"
      - "garlic"
    metadata:
      - "oily"
      - "large_portion"
    pre_meal_prokinetics: null
    notes: "Optional notes about the meal."

  stool:
    entry_type: "stool"
    timestamp: "2025-01-01T08:15:00Z"
    type: 3
    metadata:
      - "urgent"
      - "full_evacuation"
    confidence: 0.9
    notes: "Optional notes about the stool event."

  digestion:
    entry_type: "digestion"
    timestamp: "2025-01-01T18:00:00Z"
    tummy_pain: 2
    bloating: 3
    notes: "Optional notes about digestion symptoms."

  mental:
    entry_type: "mental"
    timestamp: "2025-01-01T09:00:00Z"
    mood: -1
    stress: 4
    notes: "Optional notes about mood or stressors."
